function shuffle(array){ const a=[...array]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }
function loadLocalRanking(){ try{ const raw=localStorage.getItem(LOCAL_KEY); return raw?JSON.parse(raw):[]; }catch{ return []; } }
function saveLocalRanking(items){ try{ localStorage.setItem(LOCAL_KEY, JSON.stringify(items)); }catch{} }
function currentWord(){ return state.wordPool[state.index % state.wordPool.length]; }

function beep(freq=520,duration=.08){
  try{
    const AudioCtx=window.AudioContext||window.webkitAudioContext;
    if(!window._ac) window._ac = new AudioCtx();
    const ctx=window._ac, osc=ctx.createOscillator(), gain=ctx.createGain();
    osc.type="square"; osc.frequency.value=freq; gain.gain.value=.03;
    osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime+duration);
  }catch(e){}
}

function bestProgress(){
  return state.activeStates.reduce((best,s)=>s.pos>best.pos?s:best, state.activeStates[0]||{option:currentWord().romaji[0],pos:0});
}

function handleType(char){
  if(!state.started || state.timeLeft<=0) return;
  const nextStates = [];
  state.activeStates.forEach(s=>{ if(s.option[s.pos]===char) nextStates.push({option:s.option,pos:s.pos+1}); });
  if(!nextStates.length){
    state.missCount++; state.streak=0; state.score=Math.max(0,state.score-MISS_PENALTY); beep(220,.06); render(); return;
  }
  state.activeStates = nextStates;
  state.totalTyped++;
  state.streak++;
  if(state.streak > state.maxStreak) state.maxStreak = state.streak;
  state.score += POINT_PER_CHAR + Math.min(POINT_PER_STREAK * state.streak, 20);
  beep(640,.05);
  if(nextStates.some(s=>s.pos>=s.option.length)){
    state.score += POINT_PER_WORD; state.correctWords++; beep(880,.12); state.index++; resetActive();
  }
  render();
}

document.addEventListener("keydown", (e)=>{
  const key=(e.key||"").toLowerCase();
  if(/^[a-z-]$/.test(key)){ e.preventDefault(); handleType(key); }
  if((e.key==="Enter" || e.key===" ") && !state.started){ e.preventDefault(); startGame(); }
});

let timer = null;
function startGame(){
  state.started = true;
  if(timer) clearInterval(timer);
  timer = setInterval(()=>{
    state.timeLeft--;
    if(state.timeLeft<=0){ state.timeLeft=0; clearInterval(timer); timer=null; }
    render();
  },1000);
  render();
}
function restart(){
  if(timer) clearInterval(timer);
  state.started=false; state.timeLeft=TOTAL_TIME; state.score=0; state.correctWords=0; state.totalTyped=0; state.missCount=0;
  state.streak=0; state.maxStreak=0; state.wordPool=shuffle(WORDS); state.index=0; resetActive(); state.currentName=""; state.hasRegistered=false;
  render();
}
async function loadSharedRankingNow(){
  try{
    state.rankingLoading=true; render();
    const res = await fetch(APPS_SCRIPT_URL + "?mode=list");
    const data = await res.json();
    state.ranking = Array.isArray(data.items) ? data.items.slice(0,MAX_RANKING) : [];
    saveLocalRanking(state.ranking);
    state.rankingMessage = "共通ランキングを表示中";
  }catch(e){
    state.rankingMessage = "共通ランキングに つながらないため、この端末のランキングを表示しています。";
  }finally{
    state.rankingLoading=false; render();
  }
}
async function registerScore(){
  const name = (document.getElementById("nameInput")?.value || "").trim();
  if(!name || state.hasRegistered || state.rankingLoading) return;
  state.currentName = name;
  try{
    state.rankingLoading=true; render();
    const res = await fetch(APPS_SCRIPT_URL, {method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body: JSON.stringify({name, score: state.score})});
    const data = await res.json();
    state.ranking = Array.isArray(data.items) ? data.items.slice(0,MAX_RANKING) : [];
    saveLocalRanking(state.ranking);
    state.rankingMessage = "共通ランキングに とうろくしたよ！";
    state.hasRegistered = true;
  }catch(e){
    const next = [...state.ranking, {name, score: state.score}].sort((a,b)=>b.score-a.score).slice(0,MAX_RANKING);
    state.ranking = next; saveLocalRanking(next); state.hasRegistered = true;
    state.rankingMessage = "共通ランキングに つながらなかったため、この端末だけに とうろくしました。";
  }finally{
    state.rankingLoading=false; render();
  }
}

function img(type, alt){ return `<img src="${IMAGES[type]}" alt="${alt}" style="width:100%;height:100%;object-fit:contain;image-rendering:pixelated">`; }

function renderStart(){
  return `<div class="center">
    <div class="startgrid">
      <div class="start">
        <div class="emoji">🎮</div>
        <h1>スタート しよう！</h1>
        <p>でてきた ことばを ローマじで うとう！<br>スペースキーでも スタート できるよ！</p>
        <div class="notes">
          <div class="goal">もくひょう：800てん！</div>
          <div class="note2">ミスが すくないと どんどん てんすうが のびるよ！</div>
          <div>・つぎに うつ もじは きいろで ひかるよ</div>
          <div>・つ / し / ち は 「tu」「si」「ti」でも OK！</div>
          <div>・したの キーボードを クリックしても あそべるよ</div>
        </div>
        <button class="btn startbtn" onclick="startGame()">スタート</button>
        <div class="small">Enterキー / Spaceキー でも スタート</div>
      </div>
      <div class="side">
        <div class="previewgrid">
          <div class="previewbox">${img("diamond_sword","ダイヤのけん")}</div>
          <div class="previewbox">${img("creeper","クリーパー")}</div>
          <div class="previewbox">${img("apple","りんご")}</div>
          <div class="previewbox">${img("pickaxe","つるはし")}</div>
        </div>
        <div class="sidecap">
          <div class="big">マイクラの ことばが いっぱい！</div>
          <div class="sm">けん・チェスト・クリーパー などを ローマじで うって あそぼう！</div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderPlay(){
  const cur = currentWord();
  const prog = bestProgress();
  const typed = prog.option.slice(0, prog.pos);
  const rest = prog.option.slice(prog.pos);
  const expected = [...new Set(state.activeStates.map(s=>s.option[s.pos]).filter(Boolean))];
  return `<div class="playcol">
    <div class="playcard">
      <div class="playgrid">
        <div class="imgbox">${img(cur.image, cur.jp)}</div>
        <div>
          <div class="label2">この ことばを ローマじで うとう！</div>
          <div class="jp">${cur.jp}</div>
          <div class="typed"><span class="good">${typed}</span><span class="rest">${rest}</span></div>
          <div class="example">れい： ${cur.romaji.join(" / ")}</div>
        </div>
      </div>
    </div>
    <div class="kbd">
      <div class="kbdtxt">したの キーボードを クリックしても OK！</div>
      <div class="keys">
        ${KEY_ROWS.map(row=>`<div class="keyrow">${row.map(k=>`<button class="key ${expected.includes(k)?'next':''}" onclick="handleType('${k}')">${k==='-'?'ー':k}</button>`).join("")}</div>`).join("")}
      </div>
      <div class="nexttxt">つぎに うてる もじ： <span class="nextbadge">${(expected.map(c=>c==='-'?'ー':c).join(" / ") || "おわり")}</span></div>
    </div>
  </div>`;
}

function rankItemClass(i){ return i===0?'gold':i===1?'silver':i===2?'bronze':'normal'; }
function renderResult(){
  const goal = state.score >= 800;
  let msg = "すごい！";
  if(state.score < 350) msg = "よく がんばったね！";
  else if(state.score < 600) msg = "とっても じょうず！";
  else if(state.score < 800) msg = "もうすこしで もくひょう！";
  else if(state.score < 1000) msg = "おめでとう！ もくひょう たっせい！";
  else msg = "やったね！ すごい きろく！";

  return `<div class="resultwrap">
    <div class="result ${goal?'goal':''}">
      <div class="msg">${msg}</div>
      ${goal?'<div style="margin-top:12px;font-size:56px">🎉🏆✨</div><div style="margin-top:12px;background:#fef3c7;border-radius:24px;padding:12px;font-size:24px;font-weight:900;color:#d97706">800てん いじょう クリア！ おめでとう！</div>':''}
      <div class="scorelab">スコア</div>
      <div class="scorebig">${state.score}</div>
      <div class="grid4">
        <div class="info"><div class="l">できた ことば</div><div class="n">${state.correctWords}</div></div>
        <div class="info"><div class="l">うてた もじ</div><div class="n">${state.totalTyped}</div></div>
        <div class="info"><div class="l">ミス</div><div class="n" style="color:#f43f5e">${state.missCount}</div></div>
        <div class="info"><div class="l">れんぞく</div><div class="n" style="color:#10b981">${state.maxStreak}</div></div>
      </div>
      ${goal?'<div style="margin-top:14px;font-size:20px;font-weight:800;color:#475569">ミスが すくなくて とっても じょうず！</div>':''}
      <button class="btn startbtn" style="font-size:32px;padding:14px 32px" onclick="restart()">もう いっかい</button>
    </div>

    <div class="rank">
      <h2>クラス ランキング</h2>
      <div class="rankrow">
        <input id="nameInput" class="namein" placeholder="なまえを いれてね" value="${state.currentName}">
        <button class="btn regbtn" onclick="registerScore()" ${state.hasRegistered || state.rankingLoading ? 'disabled':''}>${state.hasRegistered ? 'とうろく したよ' : 'ランキングに とうろく'}</button>
        <button class="btn loadbtn" onclick="loadSharedRankingNow()" ${state.rankingLoading ? 'disabled':''}>${state.rankingLoading ? 'よみこみ中…' : '共通ランキングを よみこむ'}</button>
      </div>
      <div class="rmsg">${state.rankingMessage}</div>
      <div class="list">
        ${state.rankingLoading ? '<div class="item"><div class="nm">ランキングを よみこみ中…</div></div>' :
          (state.ranking.length ? state.ranking.map((item,i)=>`<div class="item"><div class="ranknum ${rankItemClass(i)}">${i+1}</div><div class="nm">${item.name}</div><div class="sc">${item.score}</div></div>`).join("") : '<div class="item"><div class="nm">まだ ランキングが ないよ</div></div>')}
      </div>
    </div>
  </div>`;
}

function render(){
  document.getElementById("timeNum").textContent = state.timeLeft;
  document.getElementById("scoreNum").textContent = state.score;
  document.getElementById("wordNum").textContent = state.correctWords;
  document.getElementById("missNum").textContent = state.missCount;
  document.getElementById("timeFill").style.width = ((state.timeLeft / TOTAL_TIME) * 100) + "%";
  const main = document.getElementById("main");
  if(!state.started) main.innerHTML = renderStart();
  else if(state.timeLeft === 0) main.innerHTML = renderResult();
  else main.innerHTML = renderPlay();
}
render();
</script>
</body>
